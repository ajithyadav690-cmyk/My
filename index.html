<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aria AI | Empathetic Assistant</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        aria: {
                            rose: '#ec4899',
                            soft: '#fdf2f8',
                            dark: '#121212',
                            card: '#1e1e1e'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Ensure the app fits the mobile viewport perfectly */
        :root { --vh: 1vh; }
        body, html { 
            height: 100vh; 
            height: calc(var(--vh, 1vh) * 100);
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #fdf2f8; 
        }
        .dark body { background-color: #121212; }

        /* Markdown Styling */
        .markdown-body { font-size: 1rem; line-height: 1.6; color: inherit; }
        .markdown-body p { margin-bottom: 1rem; }
        .markdown-body code { background: rgba(236, 72, 153, 0.1); padding: 0.2rem 0.4rem; border-radius: 4px; font-family: monospace; }
        .dark .markdown-body code { background: rgba(236, 72, 153, 0.2); color: #f472b6; }
        .markdown-body pre { background: #1a1a1a; color: #fff; padding: 1rem; border-radius: 0.75rem; overflow-x: auto; margin: 1rem 0; }

        /* Animations */
        .typing-cursor { display: inline-block; width: 8px; height: 15px; background: #ec4899; margin-left: 4px; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        
        #sidebar { transition: transform 0.3s ease-in-out; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-800 dark:text-slate-200 transition-colors duration-300">

    <div id="loader" class="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-aria-soft dark:bg-aria-dark">
        <div class="w-12 h-12 border-4 border-rose-200 border-t-rose-500 rounded-full animate-spin"></div>
        <p class="mt-4 font-medium text-rose-500 animate-pulse">Waking up Aria...</p>
    </div>

    <div id="app" class="hidden flex h-full w-full overflow-hidden">
        
        <div id="overlay" class="fixed inset-0 bg-black/50 z-20 hidden lg:hidden backdrop-blur-sm"></div>

        <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 z-30 w-72 bg-white dark:bg-aria-card border-r border-rose-100 dark:border-zinc-800 transform -translate-x-full lg:translate-x-0 flex flex-col">
            <div class="p-6">
                <h1 class="text-2xl font-bold text-rose-500 mb-6 flex items-center gap-2">
                    <i class="fa-solid fa-heart-pulse"></i> Aria
                </h1>
                <button id="btn-new" class="w-full py-3 px-4 bg-rose-500 hover:bg-rose-600 text-white rounded-2xl font-bold shadow-lg shadow-rose-500/20 transition-all">
                    + New Chat
                </button>
            </div>
            <div id="history-list" class="flex-1 overflow-y-auto px-4 space-y-2 hide-scrollbar"></div>
            <div class="p-4 border-t border-rose-50 dark:border-zinc-800">
                <button id="btn-settings" class="w-full flex items-center gap-3 p-3 text-slate-500 hover:bg-rose-50 dark:hover:bg-zinc-800 rounded-xl transition-all">
                    <i class="fa-solid fa-gear"></i> Settings
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 relative h-full">
            <header class="flex items-center justify-between p-4 border-b border-rose-50 dark:border-zinc-800">
                <button id="btn-menu" class="lg:hidden p-2 text-rose-500"><i class="fa-solid fa-bars-staggered"></i></button>
                <div class="text-xs font-bold uppercase tracking-widest text-rose-400" id="display-model">Deepseek R1</div>
                <button id="btn-theme" class="p-2 text-slate-400 hover:text-rose-500"><i class="fa-solid fa-moon text-xl"></i></button>
            </header>

            <div id="chat-scroller" class="flex-1 overflow-y-auto p-4 md:p-10 space-y-6 hide-scrollbar pb-40">
                <div id="welcome" class="h-full flex flex-col items-center justify-center text-center max-w-sm mx-auto space-y-4">
                    <div class="text-5xl">🌸</div>
                    <h2 class="text-2xl font-bold">I'm Aria</h2>
                    <p class="text-slate-500 italic">"I'm here to listen and help. Tell me, how has your day been?"</p>
                </div>
            </div>

            <div class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-aria-soft dark:from-aria-dark to-transparent">
                <div class="max-w-3xl mx-auto flex items-end bg-white dark:bg-zinc-900 border border-rose-200 dark:border-zinc-700 rounded-3xl p-2 shadow-xl">
                    <textarea id="input-msg" rows="1" class="w-full bg-transparent border-none focus:ring-0 px-4 py-3 resize-none max-h-40 text-slate-800 dark:text-white" placeholder="Message Aria..."></textarea>
                    <button id="btn-send" class="bg-rose-500 hover:bg-rose-600 text-white w-12 h-10 rounded-2xl flex items-center justify-center transition-all disabled:opacity-50">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <div id="modal" class="fixed inset-0 z-[110] hidden flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div class="bg-white dark:bg-zinc-900 w-full max-w-md rounded-3xl overflow-hidden shadow-2xl">
            <div class="p-6 border-b dark:border-zinc-800 flex justify-between items-center">
                <h3 class="font-bold text-lg">Settings</h3>
                <button id="close-modal" class="text-slate-400"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="text-[10px] font-bold uppercase text-rose-400">OpenRouter API Key</label>
                    <input type="password" id="field-key" class="w-full mt-1 p-3 bg-slate-50 dark:bg-zinc-800 border dark:border-zinc-700 rounded-xl outline-none focus:border-rose-500">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase text-rose-400">System Persona</label>
                    <textarea id="field-prompt" rows="4" class="w-full mt-1 p-3 bg-slate-50 dark:bg-zinc-800 border dark:border-zinc-700 rounded-xl outline-none focus:border-rose-500 text-sm resize-none"></textarea>
                </div>
            </div>
            <div class="p-4 bg-slate-50 dark:bg-zinc-800 flex justify-end">
                <button id="save-settings" class="px-8 py-2 bg-rose-500 text-white rounded-xl font-bold">Save</button>
            </div>
        </div>
    </div>

    <script>
        // Set actual viewport height for mobile
        const setVH = () => {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        };
        window.addEventListener('resize', setVH);
        setVH();

        document.addEventListener('DOMContentLoaded', () => {
            // --- STATE ---
            let chats = JSON.parse(localStorage.getItem('aria_chats')) || [];
            let activeId = localStorage.getItem('aria_active_id') || null;
            let config = JSON.parse(localStorage.getItem('aria_config')) || {
                key: '',
                model: 'deepseek/deepseek-r1:free',
                prompt: "You are Aria, a warm, intuitive, and empathetic female AI assistant. You communicate with grace and emotional intelligence. Always acknowledge how the user feels before providing helpful solutions."
            };
            let isDark = localStorage.getItem('aria_theme') === 'dark';
            let isBusy = false;

            // --- DOM ---
            const el = {
                loader: document.getElementById('loader'),
                app: document.getElementById('app'),
                scroller: document.getElementById('chat-scroller'),
                history: document.getElementById('history-list'),
                input: document.getElementById('input-msg'),
                send: document.getElementById('btn-send'),
                theme: document.getElementById('btn-theme'),
                menu: document.getElementById('btn-menu'),
                sidebar: document.getElementById('sidebar'),
                overlay: document.getElementById('overlay'),
                modal: document.getElementById('modal'),
                openSet: document.getElementById('btn-settings'),
                closeSet: document.getElementById('close-modal'),
                saveSet: document.getElementById('save-settings'),
                fieldKey: document.getElementById('field-key'),
                fieldPrompt: document.getElementById('field-prompt')
            };

            // --- INIT ---
            const init = () => {
                applyTheme();
                renderHistory();
                renderMessages();
                el.fieldKey.value = config.key;
                el.fieldPrompt.value = config.prompt;
                setTimeout(() => {
                    el.loader.classList.add('hidden');
                    el.app.classList.remove('hidden');
                }, 500);
            };

            const applyTheme = () => {
                document.documentElement.classList.toggle('dark', isDark);
                el.theme.innerHTML = isDark ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
            };

            const save = () => {
                localStorage.setItem('aria_chats', JSON.stringify(chats));
                localStorage.setItem('aria_config', JSON.stringify(config));
                localStorage.setItem('aria_active_id', activeId);
                localStorage.setItem('aria_theme', isDark ? 'dark' : 'light');
            };

            // --- UI ACTIONS ---
            const renderHistory = () => {
                el.history.innerHTML = chats.map(c => `
                    <div onclick="selectChat('${c.id}')" class="p-3 rounded-xl cursor-pointer flex justify-between items-center group ${activeId === c.id ? 'bg-rose-500/10 text-rose-600' : 'hover:bg-slate-50 dark:hover:bg-zinc-800'}">
                        <span class="truncate text-sm font-medium pr-2">${c.title}</span>
                        <i class="fa-solid fa-trash text-[10px] opacity-0 group-hover:opacity-100 hover:text-red-500" onclick="event.stopPropagation(); deleteChat('${c.id}')"></i>
                    </div>
                `).join('');
            };

            const renderMessages = () => {
                const chat = chats.find(c => c.id === activeId);
                if (!chat || chat.messages.length === 0) {
                    el.scroller.innerHTML = document.getElementById('welcome').outerHTML;
                    return;
                }
                el.scroller.innerHTML = chat.messages.map(m => `
                    <div class="flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}">
                        <div class="max-w-[85%] p-4 rounded-2xl ${m.role === 'user' ? 'bg-rose-500 text-white rounded-tr-none' : 'bg-white dark:bg-zinc-800 border dark:border-zinc-700 rounded-tl-none'} shadow-sm">
                            <div class="markdown-body">${marked.parse(m.content)}</div>
                        </div>
                    </div>
                `).join('');
                el.scroller.scrollTop = el.scroller.scrollHeight;
            };

            window.selectChat = (id) => {
                activeId = id;
                save();
                renderHistory();
                renderMessages();
                closeSidebar();
            };

            window.deleteChat = (id) => {
                chats = chats.filter(c => c.id !== id);
                if (activeId === id) activeId = chats[0]?.id || null;
                save(); renderHistory(); renderMessages();
            };

            const closeSidebar = () => {
                el.sidebar.classList.add('-translate-x-full');
                el.overlay.classList.add('hidden');
            };

            // --- SEND LOGIC ---
            const handleSend = async () => {
                const text = el.input.value.trim();
                if (!text || isBusy) return;
                if (!config.key) { alert("Please add your API key in settings!"); el.modal.classList.remove('hidden'); return; }

                if (!activeId) {
                    const newId = Date.now().toString();
                    chats.unshift({ id: newId, title: text.slice(0, 20), messages: [] });
                    activeId = newId;
                }

                const chat = chats.find(c => c.id === activeId);
                chat.messages.push({ role: 'user', content: text });
                el.input.value = '';
                el.input.style.height = 'auto';
                renderMessages();
                renderHistory();

                isBusy = true;
                el.send.disabled = true;

                // Create placeholder for AI
                const aiWrapper = document.createElement('div');
                aiWrapper.className = "flex justify-start";
                aiWrapper.innerHTML = `
                    <div class="max-w-[85%] p-4 rounded-2xl bg-white dark:bg-zinc-800 border dark:border-zinc-700 rounded-tl-none shadow-sm">
                        <div class="markdown-body"><span class="typing-cursor"></span></div>
                    </div>
                `;
                el.scroller.appendChild(aiWrapper);
                const contentArea = aiWrapper.querySelector('.markdown-body');

                let fullText = "";
                try {
                    const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                        method: "POST",
                        headers: { "Authorization": `Bearer ${config.key}`, "Content-Type": "application/json" },
                        body: JSON.stringify({
                            model: config.model,
                            messages: [{ role: "system", content: config.prompt }, ...chat.messages],
                            stream: true
                        })
                    });

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        const chunk = decoder.decode(value);
                        const lines = chunk.split('\n');
                        for (let line of lines) {
                            if (line.startsWith('data: ')) {
                                const dataStr = line.slice(6);
                                if (dataStr === '[DONE]') break;
                                try {
                                    const json = JSON.parse(dataStr);
                                    const content = json.choices[0].delta.content || "";
                                    fullText += content;
                                    contentArea.innerHTML = marked.parse(fullText) + '<span class="typing-cursor"></span>';
                                    el.scroller.scrollTop = el.scroller.scrollHeight;
                                } catch (e) {}
                            }
                        }
                    }
                    contentArea.innerHTML = marked.parse(fullText);
                    chat.messages.push({ role: 'assistant', content: fullText });
                } catch (err) {
                    contentArea.innerHTML = "I'm so sorry, I had trouble connecting. Please check your key.";
                } finally {
                    isBusy = false;
                    el.send.disabled = false;
                    save();
                }
            };

            // --- EVENTS ---
            el.send.onclick = handleSend;
            el.input.onkeydown = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };
            el.input.oninput = () => { el.input.style.height = 'auto'; el.input.style.height = el.input.scrollHeight + 'px'; };
            el.theme.onclick = () => { isDark = !isDark; applyTheme(); save(); };
            el.menu.onclick = () => { el.sidebar.classList.remove('-translate-x-full'); el.overlay.classList.remove('hidden'); };
            el.overlay.onclick = closeSidebar;
            el.openSet.onclick = () => { el.modal.classList.remove('hidden'); closeSidebar(); };
            el.closeSet.onclick = () => el.modal.classList.add('hidden');
            el.saveSet.onclick = () => {
                config.key = el.fieldKey.value.trim();
                config.prompt = el.fieldPrompt.value.trim();
                save(); el.modal.classList.add('hidden');
            };
            document.getElementById('btn-new').onclick = () => {
                const newId = Date.now().toString();
                chats.unshift({ id: newId, title: 'New Conversation', messages: [] });
                activeId = newId;
                save(); renderHistory(); renderMessages(); closeSidebar();
            };

            init();
        });
    </script>
</body>
                        </html>
