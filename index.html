<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal AI Chat Interface</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gemini: {
                            light: '#f0f4f9',
                            dark: '#131314',
                            sidebarLight: '#f0f4f9',
                            sidebarDark: '#1e1f20',
                            cardLight: '#ffffff',
                            cardDark: '#1e1f20',
                        }
                    }
                }
            }
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Base styles & Resets */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: #f0f4f9;
        }
        .dark body, .dark html {
            background-color: #131314;
        }

        /* Hide Scrollbar but keep functionality */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Custom Markdown Styling */
        .markdown-body {
            font-size: 1rem;
            line-height: 1.6;
            word-wrap: break-word;
        }
        .markdown-body p { margin-bottom: 0.75em; }
        .markdown-body p:last-child { margin-bottom: 0; }
        .markdown-body pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin: 1em 0;
        }
        .markdown-body code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            background: rgba(175, 184, 193, 0.2);
            padding: 0.2em 0.4em;
            border-radius: 0.25rem;
            font-size: 0.875em;
        }
        .markdown-body pre code {
            background: transparent;
            padding: 0;
            color: inherit;
        }
        .markdown-body ul { list-style-type: disc; padding-left: 2em; margin-bottom: 1em; }
        .markdown-body ol { list-style-type: decimal; padding-left: 2em; margin-bottom: 1em; }
        .markdown-body a { color: #3b82f6; text-decoration: underline; }

        /* Typing cursor animation */
        .typing-cursor::after {
            content: '▋';
            animation: blink 1s step-start infinite;
            color: #3b82f6;
            margin-left: 2px;
        }
        @keyframes blink { 50% { opacity: 0; } }
        
        /* Mobile transitions */
        #sidebar {
            transition: transform 0.3s ease-in-out;
        }
    </style>
</head>
<body class="text-gray-900 dark:text-gray-100 font-sans antialiased">

    <div id="loading" class="fixed inset-0 flex flex-col items-center justify-center bg-gemini-light dark:bg-gemini-dark z-[100]">
        <i class="fa-solid fa-circle-notch fa-spin text-4xl text-blue-500 mb-4"></i>
        <h2 class="text-xl font-semibold">Loading App...</h2>
    </div>

    <div id="app" class="hidden flex min-h-[100dvh] w-full bg-gemini-light dark:bg-gemini-dark relative overflow-hidden">
        
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-20 hidden lg:hidden"></div>

        <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 z-30 w-72 bg-gemini-sidebarLight dark:bg-gemini-sidebarDark transform -translate-x-full lg:translate-x-0 flex flex-col h-[100dvh]">
            <div class="p-4 flex items-center justify-between">
                <button id="new-chat-btn" class="flex items-center gap-2 bg-gray-200 dark:bg-gray-800 hover:bg-gray-300 dark:hover:bg-gray-700 px-4 py-3 rounded-full text-sm font-medium transition-colors w-full">
                    <i class="fa-solid fa-plus"></i> New Chat
                </button>
                <button id="close-sidebar-btn" class="lg:hidden ml-2 p-2 text-gray-500 hover:text-gray-900 dark:hover:text-white">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>

            <div class="flex-1 overflow-y-auto no-scrollbar px-3 pb-4 space-y-1" id="chat-list">
                </div>

            <div class="p-4 border-t border-gray-200 dark:border-gray-800">
                <button id="open-settings-btn" class="flex items-center gap-3 w-full p-3 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors text-sm font-medium">
                    <i class="fa-solid fa-gear text-gray-500 dark:text-gray-400"></i> Settings
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col h-[100dvh] w-full relative">
            
            <header class="flex items-center justify-between p-4 h-16 bg-gemini-light dark:bg-gemini-dark">
                <div class="flex items-center gap-3">
                    <button id="open-sidebar-btn" class="lg:hidden p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors">
                        <i class="fa-solid fa-bars text-xl"></i>
                    </button>
                    <h1 class="text-xl font-medium tracking-wide flex items-center gap-2">
                        <i class="fa-solid fa-sparkles text-blue-500"></i> AI Assistant
                    </h1>
                </div>
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors" aria-label="Toggle Dark Mode">
                    <i id="theme-icon" class="fa-solid fa-moon text-xl"></i>
                </button>
            </header>

            <div id="chat-container" class="flex-1 overflow-y-auto p-4 sm:p-6 md:px-12 lg:px-24 space-y-6 no-scrollbar pb-32">
                </div>

            <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-gemini-light via-gemini-light dark:from-gemini-dark dark:via-gemini-dark to-transparent pt-6 pb-4 px-4 md:px-12 lg:px-24">
                <div class="max-w-4xl mx-auto bg-gemini-cardLight dark:bg-gemini-cardDark rounded-3xl shadow-lg border border-gray-200 dark:border-gray-700 flex flex-col p-2 relative">
                    <textarea 
                        id="message-input" 
                        rows="1" 
                        class="w-full bg-transparent border-none focus:ring-0 resize-none px-4 py-3 max-h-32 overflow-y-auto no-scrollbar outline-none text-gray-900 dark:text-gray-100 placeholder-gray-500"
                        placeholder="Type your message here..."
                    ></textarea>
                    <div class="flex justify-between items-center px-2 pb-1">
                        <div class="text-xs text-gray-400 px-2" id="current-model-display">deepseek/deepseek-r1:free</div>
                        <button id="send-btn" class="bg-blue-600 hover:bg-blue-700 text-white rounded-full w-10 h-10 flex items-center justify-center transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
                <div class="text-center text-xs text-gray-500 mt-2">
                    AI can make mistakes. Verify important information.
                </div>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-[#1e1f20] rounded-2xl w-full max-w-md shadow-2xl overflow-hidden transform transition-all">
            <div class="p-5 border-b border-gray-200 dark:border-gray-800 flex justify-between items-center">
                <h2 class="text-xl font-semibold">Settings</h2>
                <button id="close-settings-btn" class="text-gray-500 hover:text-gray-900 dark:hover:text-white">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <div class="p-5 space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">OpenRouter API Key <span class="text-red-500">*</span></label>
                    <input type="password" id="api-key-input" class="w-full bg-gray-50 dark:bg-[#131314] border border-gray-300 dark:border-gray-700 rounded-lg px-4 py-2 outline-none focus:border-blue-500" placeholder="sk-or-v1-...">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Model Name</label>
                    <input type="text" id="model-input" class="w-full bg-gray-50 dark:bg-[#131314] border border-gray-300 dark:border-gray-700 rounded-lg px-4 py-2 outline-none focus:border-blue-500" value="deepseek/deepseek-r1:free">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Global System Prompt</label>
                    <textarea id="system-prompt-input" rows="3" class="w-full bg-gray-50 dark:bg-[#131314] border border-gray-300 dark:border-gray-700 rounded-lg px-4 py-2 outline-none focus:border-blue-500 resize-none" placeholder="You are a helpful AI assistant..."></textarea>
                </div>
            </div>
            <div class="p-5 border-t border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-[#131314] flex justify-end gap-3">
                <button id="cancel-settings-btn" class="px-4 py-2 rounded-lg text-sm font-medium hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors">Cancel</button>
                <button id="save-settings-btn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition-colors">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            // --- STATE MANAGEMENT ---
            let chats = JSON.parse(localStorage.getItem('chats')) || [];
            let currentChatId = localStorage.getItem('currentChatId') || null;
            let settings = JSON.parse(localStorage.getItem('settings')) || {
                apiKey: '',
                model: 'deepseek/deepseek-r1:free',
                systemPrompt: 'You are a helpful, harmless, and honest AI assistant.'
            };
            let isDarkMode = localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);
            let isGenerating = false;
            let abortController = null;

            // --- DOM ELEMENTS ---
            const els = {
                app: document.getElementById('app'),
                loading: document.getElementById('loading'),
                sidebar: document.getElementById('sidebar'),
                sidebarOverlay: document.getElementById('sidebar-overlay'),
                openSidebarBtn: document.getElementById('open-sidebar-btn'),
                closeSidebarBtn: document.getElementById('close-sidebar-btn'),
                themeToggle: document.getElementById('theme-toggle'),
                themeIcon: document.getElementById('theme-icon'),
                chatContainer: document.getElementById('chat-container'),
                chatList: document.getElementById('chat-list'),
                newChatBtn: document.getElementById('new-chat-btn'),
                messageInput: document.getElementById('message-input'),
                sendBtn: document.getElementById('send-btn'),
                settingsModal: document.getElementById('settings-modal'),
                openSettingsBtn: document.getElementById('open-settings-btn'),
                closeSettingsBtn: document.getElementById('close-settings-btn'),
                cancelSettingsBtn: document.getElementById('cancel-settings-btn'),
                saveSettingsBtn: document.getElementById('save-settings-btn'),
                apiKeyInput: document.getElementById('api-key-input'),
                modelInput: document.getElementById('model-input'),
                systemPromptInput: document.getElementById('system-prompt-input'),
                currentModelDisplay: document.getElementById('current-model-display')
            };

            // Defensive Check
            for (let key in els) {
                if (!els[key]) console.warn(`Element missing: ${key}`);
            }

            // --- INITIALIZATION ---
            function init() {
                applyTheme();
                els.currentModelDisplay.textContent = settings.model || 'deepseek/deepseek-r1:free';
                
                if (chats.length === 0) {
                    createNewChat();
                } else {
                    if (!currentChatId || !chats.find(c => c.id === currentChatId)) {
                        currentChatId = chats[0].id;
                    }
                    renderSidebar();
                    renderChat();
                }

                // Hide loader and show app
                setTimeout(() => {
                    els.loading.classList.add('hidden');
                    els.app.classList.remove('hidden');
                }, 300); // Slight delay for smooth transition
            }

            // --- UTILS ---
            function generateId() {
                return Date.now().toString(36) + Math.random().toString(36).substring(2);
            }

            function saveData() {
                try {
                    localStorage.setItem('chats', JSON.stringify(chats));
                    localStorage.setItem('currentChatId', currentChatId);
                    localStorage.setItem('settings', JSON.stringify(settings));
                } catch (e) {
                    console.error("Local storage quota exceeded or disabled.", e);
                }
            }

            function scrollToBottom() {
                els.chatContainer.scrollTop = els.chatContainer.scrollHeight;
            }

            function escapeHTML(str) {
                if (!str) return '';
                return str.replace(/[&<>'"]/g, 
                    tag => ({
                        '&': '&amp;',
                        '<': '&lt;',
                        '>': '&gt;',
                        "'": '&#39;',
                        '"': '&quot;'
                    }[tag] || tag)
                );
            }

            // --- THEME ---
            function applyTheme() {
                if (isDarkMode) {
                    document.documentElement.classList.add('dark');
                    els.themeIcon.classList.replace('fa-moon', 'fa-sun');
                } else {
                    document.documentElement.classList.remove('dark');
                    els.themeIcon.classList.replace('fa-sun', 'fa-moon');
                }
            }

            els.themeToggle.addEventListener('click', () => {
                isDarkMode = !isDarkMode;
                localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
                applyTheme();
            });

            // --- SIDEBAR (MOBILE) ---
            function openSidebar() {
                els.sidebar.classList.remove('-translate-x-full');
                els.sidebarOverlay.classList.remove('hidden');
            }
            
            function closeSidebar() {
                els.sidebar.classList.add('-translate-x-full');
                els.sidebarOverlay.classList.add('hidden');
            }

            els.openSidebarBtn.addEventListener('click', openSidebar);
            els.closeSidebarBtn.addEventListener('click', closeSidebar);
            els.sidebarOverlay.addEventListener('click', closeSidebar);

            // --- SETTINGS MODAL ---
            function openSettings() {
                els.apiKeyInput.value = settings.apiKey || '';
                els.modelInput.value = settings.model || 'deepseek/deepseek-r1:free';
                els.systemPromptInput.value = settings.systemPrompt || '';
                els.settingsModal.classList.remove('hidden');
            }

            function closeSettings() {
                els.settingsModal.classList.add('hidden');
            }

            function saveSettings() {
                const newKey = els.apiKeyInput.value.trim();
                const newModel = els.modelInput.value.trim() || 'deepseek/deepseek-r1:free';
                settings = {
                    apiKey: newKey,
                    model: newModel,
                    systemPrompt: els.systemPromptInput.value.trim()
                };
                els.currentModelDisplay.textContent = newModel;
                saveData();
                closeSettings();
            }

            els.openSettingsBtn.addEventListener('click', () => { closeSidebar(); openSettings(); });
            els.closeSettingsBtn.addEventListener('click', closeSettings);
            els.cancelSettingsBtn.addEventListener('click', closeSettings);
            els.saveSettingsBtn.addEventListener('click', saveSettings);
            els.settingsModal.addEventListener('click', (e) => {
                if (e.target === els.settingsModal) closeSettings();
            });

            // --- CHAT MANAGEMENT ---
            function createNewChat() {
                const newChat = {
                    id: generateId(),
                    title: 'New Chat',
                    messages: []
                };
                chats.unshift(newChat);
                currentChatId = newChat.id;
                saveData();
                renderSidebar();
                renderChat();
                if(window.innerWidth < 1024) closeSidebar();
            }

            els.newChatBtn.addEventListener('click', createNewChat);

            function selectChat(id) {
                if (isGenerating) return;
                currentChatId = id;
                saveData();
                renderSidebar();
                renderChat();
                if(window.innerWidth < 1024) closeSidebar();
            }

            function deleteChat(id, event) {
                event.stopPropagation();
                if (isGenerating) return;
                if (!confirm("Are you sure you want to delete this chat?")) return;
                
                chats = chats.filter(c => c.id !== id);
                if (chats.length === 0) {
                    createNewChat();
                } else if (currentChatId === id) {
                    currentChatId = chats[0].id;
                }
                saveData();
                renderSidebar();
                renderChat();
            }

            function renameChat(id, event) {
                event.stopPropagation();
                const chat = chats.find(c => c.id === id);
                if(!chat) return;
                const newTitle = prompt("Enter new chat name:", chat.title);
                if (newTitle && newTitle.trim() !== '') {
                    chat.title = newTitle.trim();
                    saveData();
                    renderSidebar();
                }
            }

            function renderSidebar() {
                els.chatList.innerHTML = '';
                chats.forEach(chat => {
                    const isActive = chat.id === currentChatId;
                    const item = document.createElement('div');
                    item.className = `group flex items-center justify-between p-3 rounded-lg cursor-pointer transition-colors ${isActive ? 'bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400 font-medium' : 'hover:bg-gray-200 dark:hover:bg-gray-800 text-gray-700 dar
